

<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #13131a; --card: #1a1a24;
    --border: rgba(255,255,255,0.08); --accent: #e63946;
    --accent2: #f4a261; --text: #f0f0f5; --muted: #7a7a90; --live: #22c55e;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  #app { max-width: 1000px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

  .site-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--accent); letter-spacing: 2px; }
  .tagline { font-size: 13px; color: var(--muted); }

  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .filter-btn { background: var(--card); border: 1px solid var(--border); color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 6px 14px; border-radius: 20px; cursor: pointer; transition: all 0.15s; text-transform: capitalize; }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 1px; color: var(--muted); margin-bottom: 1rem; }
  .matches-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 12px; }

  .match-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    cursor: pointer; transition: all 0.18s; position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .match-card:hover { border-color: rgba(230,57,70,0.5); transform: translateY(-2px); }
  .match-card.popular { border-color: rgba(230,57,70,0.3); }
  .match-card.popular::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); z-index: 2; }

  .poster-wrap { position: relative; width: 100%; aspect-ratio: 16/7; overflow: hidden; background: #111; }
  .poster-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .poster-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(10,10,15,0.85) 100%); }
  .poster-badges { position: absolute; bottom: 10px; left: 0; right: 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .poster-badge-img { width: 40px; height: 40px; object-fit: contain; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.7)); }
  .poster-vs { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: rgba(255,255,255,0.6); letter-spacing: 2px; }
  .poster-status { position: absolute; top: 8px; right: 8px; }

  .live-pill { background: var(--live); color: #fff; font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 4px; letter-spacing: 0.5px; display: flex; align-items: center; gap: 4px; }
  .live-dot { width: 6px; height: 6px; background: #fff; border-radius: 50%; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .card-body { padding: 10px 12px 12px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .card-top { display: flex; align-items: center; justify-content: space-between; }
  .category-badge { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
  .match-time { font-size: 12px; color: var(--muted); }
  .match-title { font-size: 14px; font-weight: 500; line-height: 1.35; color: var(--text); }
  .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 6px; }
  .popular-badge { font-size: 11px; color: var(--accent2); }
  .source-count { font-size: 12px; color: var(--muted); }
  .watch-btn { width: 100%; margin-top: 8px; background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
  .watch-btn:hover { opacity: 0.85; }

  .player-section { display: none; background: var(--surface); border-radius: 16px; border: 1px solid var(--border); padding: 1.25rem; margin-bottom: 1.5rem; }
  .player-section.visible { display: block; }
  .player-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; gap: 12px; }
  .player-match-info { display: flex; align-items: center; gap: 10px; }
  .player-badge { width: 30px; height: 30px; object-fit: contain; }
  .player-title { font-size: 15px; font-weight: 500; }
  .close-btn { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; flex-shrink: 0; }
  .close-btn:hover { color: var(--text); }
  .player-wrap { position: relative; width: 100%; padding-top: 56.25%; background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 1rem; }
  .player-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
  .stream-list { display: flex; gap: 8px; flex-wrap: wrap; }
  .stream-btn { background: var(--card); border: 1px solid var(--border); color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 5px 12px; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
  .stream-btn:hover, .stream-btn.active { border-color: var(--accent); color: var(--text); }
  .hd-tag { color: var(--accent2); font-size: 10px; margin-left: 4px; }

  .loading { text-align: center; padding: 3rem; color: var(--muted); }
  .error { text-align: center; padding: 3rem; color: #e55; }
  .empty { text-align: center; padding: 2rem; color: var(--muted); font-size: 14px; }

  .no-poster { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #111; }
  .no-poster-inner { display: flex; align-items: center; gap: 12px; }
  .fallback-badge { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; color: var(--muted); }
</style>

<div id="app">
  <div class="site-header">
    <div>
      <div class="logo">StreamZone</div>
      <div class="tagline">Live sports, free streams</div>
    </div>
  </div>

  <div id="player-section" class="player-section">
    <div class="player-header">
      <div class="player-match-info" id="player-match-info"></div>
      <button class="close-btn" onclick="closePlayer()">×</button>
    </div>
    <div class="player-wrap">
      <iframe id="player-iframe" allowfullscreen></iframe>
    </div>
    <div class="stream-list" id="stream-list"></div>
  </div>

  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('live', this)"><span class="live-dot" style="background:var(--live);display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;"></span>Live</button>
  </div>

  <div id="matches-container">
    <div class="loading">Loading matches...</div>
  </div>
</div>

<script>
const BASE = 'https://streamed.pk';
let allMatches = [];

function badgeUrl(id) { return id ? `${BASE}/api/images/badge/${id}.webp` : null; }
function posterUrl(m) {
  if (m.poster) return `${BASE}${m.poster}.webp`;
  if (m.teams?.home?.badge && m.teams?.away?.badge)
    return `${BASE}/api/images/poster/${m.teams.home.badge}/${m.teams.away.badge}.webp`;
  return null;
}

async function init() {
  try {
    const [liveRes, todayRes] = await Promise.all([
      fetch(`${BASE}/api/matches/live`),
      fetch(`${BASE}/api/matches/all-today`)
    ]);
    const live = liveRes.ok ? await liveRes.json() : [];
    const today = todayRes.ok ? await todayRes.json() : [];
    const liveIds = new Set(live.map(m => m.id));
    allMatches = [
      ...live.map(m => ({...m, isLive: true})),
      ...today.filter(m => !liveIds.has(m.id)).map(m => ({...m, isLive: false}))
    ];
    buildFilters(allMatches);
    render(allMatches);
  } catch(e) {
    document.getElementById('matches-container').innerHTML = `<div class="error">Could not load matches.</div>`;
  }
}

function buildFilters(matches) {
  const cats = [...new Set(matches.map(m => m.category).filter(Boolean))];
  const bar = document.getElementById('filter-bar');
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = cat;
    btn.onclick = function() { setFilter(cat, this); };
    bar.appendChild(btn);
  });
}

function setFilter(f, el) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  const filtered = f === 'all' ? allMatches
    : f === 'live' ? allMatches.filter(m => m.isLive)
    : allMatches.filter(m => m.category === f);
  render(filtered);
}

function render(matches) {
  const container = document.getElementById('matches-container');
  if (!matches.length) { container.innerHTML = '<div class="empty">No matches found.</div>'; return; }

  const sorted = [...matches].sort((a, b) => {
    if (a.popular && !b.popular) return -1;
    if (!a.popular && b.popular) return 1;
    if (a.isLive && !b.isLive) return -1;
    if (!a.isLive && b.isLive) return 1;
    return a.date - b.date;
  });

  const liveOnes = sorted.filter(m => m.isLive);
  const rest = sorted.filter(m => !m.isLive);

  let html = '';
  if (liveOnes.length) {
    html += `<div class="section-title">Live now</div><div class="matches-grid">`;
    liveOnes.forEach(m => html += cardHtml(m));
    html += `</div>`;
  }
  if (rest.length) {
    html += `<div class="section-title" style="margin-top:1.5rem">Today's matches</div><div class="matches-grid">`;
    rest.forEach(m => html += cardHtml(m));
    html += `</div>`;
  }
  container.innerHTML = html;
}

function cardHtml(m) {
  const time = new Date(m.date).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  const pUrl = posterUrl(m);
  const homeBadge = badgeUrl(m.teams?.home?.badge);
  const awayBadge = badgeUrl(m.teams?.away?.badge);
  const enc = encodeURIComponent(JSON.stringify(m));

  let posterHtml;
  if (pUrl) {
    posterHtml = `
      <div class="poster-wrap">
        <img src="${pUrl}" alt="${m.title}" loading="lazy" onerror="this.parentElement.innerHTML=fallbackPoster(${JSON.stringify(m.teams?.home?.name||'').replace(/"/g,'&quot;')},${JSON.stringify(m.teams?.away?.name||'').replace(/"/g,'&quot;')},${JSON.stringify(homeBadge||'').replace(/"/g,'&quot;')},${JSON.stringify(awayBadge||'').replace(/"/g,'&quot;')})">
        <div class="poster-overlay"></div>
        ${homeBadge && awayBadge ? `
        <div class="poster-badges">
          <img class="poster-badge-img" src="${homeBadge}" alt="${m.teams?.home?.name||''}" loading="lazy" onerror="this.style.display='none'">
          <span class="poster-vs">VS</span>
          <img class="poster-badge-img" src="${awayBadge}" alt="${m.teams?.away?.name||''}" loading="lazy" onerror="this.style.display='none'">
        </div>` : ''}
        ${m.isLive ? `<div class="poster-status"><span class="live-pill"><span class="live-dot"></span>LIVE</span></div>` : ''}
      </div>`;
  } else {
    posterHtml = `
      <div class="poster-wrap">
        <div class="no-poster">
          <div class="no-poster-inner">
            ${homeBadge ? `<img class="poster-badge-img" src="${homeBadge}" alt="" loading="lazy" onerror="this.style.display='none'" style="width:44px;height:44px">` : `<div class="fallback-badge">${(m.teams?.home?.name||'?')[0]}</div>`}
            <span class="poster-vs" style="font-size:0.9rem">VS</span>
            ${awayBadge ? `<img class="poster-badge-img" src="${awayBadge}" alt="" loading="lazy" onerror="this.style.display='none'" style="width:44px;height:44px">` : `<div class="fallback-badge">${(m.teams?.away?.name||'?')[0]}</div>`}
          </div>
        </div>
        ${m.isLive ? `<div class="poster-status"><span class="live-pill"><span class="live-dot"></span>LIVE</span></div>` : ''}
      </div>`;
  }

  return `<div class="match-card${m.popular?' popular':''}" onclick="watchMatchData('${enc}')">
    ${posterHtml}
    <div class="card-body">
      <div class="card-top">
        <span class="category-badge">${m.category||'sport'}</span>
        ${m.isLive ? '' : `<span class="match-time">${time}</span>`}
      </div>
      <div class="match-title">${m.title}</div>
      <div class="card-footer">
        ${m.popular ? `<span class="popular-badge">★ Popular</span>` : `<span></span>`}
        <span class="source-count">${m.sources?.length||0} stream${m.sources?.length!==1?'s':''}</span>
      </div>
      <button class="watch-btn">Watch now</button>
    </div>
  </div>`;
}

function watchMatchData(enc) {
  watchMatch(JSON.parse(decodeURIComponent(enc)));
}

async function watchMatch(m) {
  const section = document.getElementById('player-section');
  const infoEl = document.getElementById('player-match-info');
  const streamList = document.getElementById('stream-list');
  const iframe = document.getElementById('player-iframe');

  section.classList.add('visible');
  iframe.src = '';
  streamList.innerHTML = '<span style="color:var(--muted);font-size:13px">Loading streams...</span>';

  const hb = badgeUrl(m.teams?.home?.badge);
  const ab = badgeUrl(m.teams?.away?.badge);
  infoEl.innerHTML = `
    ${hb ? `<img class="player-badge" src="${hb}" alt="" onerror="this.style.display='none'">` : ''}
    <span class="player-title">${m.title}</span>
    ${ab ? `<img class="player-badge" src="${ab}" alt="" onerror="this.style.display='none'">` : ''}
  `;

  section.scrollIntoView({behavior:'smooth', block:'start'});

  try {
    const sources = m.sources || [];
    if (!sources.length) { streamList.innerHTML = '<span style="color:#e55;font-size:13px">No streams available</span>'; return; }
    const first = sources[0];
    const res = await fetch(`${BASE}/api/stream/${first.source}/${first.id}`);
    const streams = res.ok ? await res.json() : [];
    if (!streams.length) { streamList.innerHTML = '<span style="color:#e55;font-size:13px">No streams found</span>'; return; }

    streamList.innerHTML = '';
    streams.forEach((s, i) => {
      const btn = document.createElement('button');
      btn.className = 'stream-btn' + (i===0?' active':'');
      btn.innerHTML = `${s.language} #${s.streamNo}${s.hd?'<span class="hd-tag">HD</span>':''}`;
      btn.onclick = () => {
        document.querySelectorAll('.stream-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        iframe.src = s.embedUrl;
      };
      streamList.appendChild(btn);
    });
    if (streams[0]) iframe.src = streams[0].embedUrl;
  } catch(e) {
    streamList.innerHTML = '<span style="color:#e55;font-size:13px">Failed to load streams</span>';
  }
}

function closePlayer() {
  document.getElementById('player-section').classList.remove('visible');
  document.getElementById('player-iframe').src = '';
}

init();
</script>
